name: CI/CD pipeline with Auto Rollback

on:
  push:
    branches: [main]
  pull_requests:
    branches: [main]

env:
  IMAGE_NAME: cicd-demo
  CONTAINER_NAME: cicd-demo-app
  APP_PORT: 3000

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      
      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests with coverage
        working-directory: app
        run: npm ci

      - name: Upload coverage report
        uses: actions/upload-arifact@v4
        with:
          name: coverage-report
          path: app/coverage/


# job-2 :build docker img and push to docker hub

build:
  name: Build & push Docker image
  runs-on: ubuntu-latest
  needs: test
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  outputs:
    image_tag: ${{ steps.tag.outputs.tag }}
    full_image: ${{ steps.tag.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: |
         TAG="${{ github.actor }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::8}"
          echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "full_image=$TAG" >> $GITHUB_OUTPUT
          echo "Image will be: $TAG"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with: 
          context: ./app
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ github.actor }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.tag }}
            
            
            
deploy:
  name: Deploy to EC2 + auto rollback
  runs-on: ubuntu-latest
  needs: build
  environment: production


  steps:
    - name: Checkout code 
      uses: actions/checkout@v4

    - name: Copy deploy & health check scripts to EC2
      uses: appleboy/scp-actions@v0.1.7
      with:
         host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/,docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/cicd-demo"

    - name: Deploy on EC2 with auto rollback
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          cd /home/${{ secrets.EC2_USER }}/cicd-demo
          chmod +x scripts/deploy_ec2.sh scripts/health_check.sh
 
          # Run the deploy script with the new image
          bash scripts/deploy_ec2.sh \
            "${{ needs.build.outputs.full_image }}" \
            "${{ needs.build.outputs.image_tag }}" \
            "${{ env.CONTAINER_NAME }}" \
            "${{ env.APP_PORT }}"

    - name: Notify on success
      if: sucess()
      run: |
        echo "::notice::Deploy succeeded — ${{ needs.build.outputs.image_tag }} is live on EC2."

    - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy FAILED. Auto rollback was triggered on EC2. Check EC2 logs."

