name: CI/CD Pipeline with Auto Rollback

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cicd-demo
  CONTAINER_NAME: cicd-demo-app
  APP_PORT: 3000

jobs:

  # =========================================================
  # JOB 1 — TEST
  # =========================================================
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests with coverage
        working-directory: app
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  # =========================================================
  # JOB 2 — BUILD + PUSH IMAGE
  # =========================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    needs: test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      full_image: ${{ steps.tag.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate image tag
        id: tag
        run: |
          TAG="${GITHUB_SHA::8}"

          FULL_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_IMAGE" >> $GITHUB_OUTPUT

          echo "Using image: $FULL_IMAGE"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.full_image }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Push Docker images
        run: |
          docker push ${{ steps.tag.outputs.full_image }}

          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # =========================================================
  # JOB 3 — DEPLOY + AUTO ROLLBACK
  # =========================================================
  deploy:
    name: Deploy to EC2 + Auto Rollback
    runs-on: ubuntu-latest

    needs: build

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Copy deployment scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          source: "scripts/"
          target: "/home/${{ secrets.EC2_USER }}/cicd-demo"

      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd /home/ubuntu/cicd-demo

            chmod +x scripts/deploy_ec2.sh
            chmod +x scripts/health_check.sh

            bash scripts/deploy_ec2.sh \
              "dianger16/ci-cd-demo:${{ github.sha }}" \
              "${{ github.sha }}" \
              "cicd-demo-app" \
              "3000"
              

      - name: Deployment success notification
        if: success()
        run: |
          echo "::notice::Deployment successful!"
          echo "::notice::Version: ${{ needs.build.outputs.image_tag }}"

      - name: Deployment failed notification
        if: failure()
        run: |
          echo "::error::Deployment failed!"
          echo "::error::Auto rollback executed on EC2."
